<!DOCTYPE html>
<html>
<head>
    <title>View Expenses</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 20px;
        }

        .back-btn {
            padding: 8px 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }

        .back-btn:hover {
            background-color: #555;
        }

        .Modify-btn{
            padding: 8px 15px;
            background-color:  #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }

        .Modify-btn:hover{
            background-color: #555;
        }

        .modify-div{
            padding-top: 30px;
        }

        .clear-div{
            padding-top: 10px;
        }

        .container {
            width: 80%;
            margin: 20px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #4CAF50;
            color: white;

        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .total {
            text-align: right;
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }

    </style>
</head>

<body>

    <div class="header">
        <h3>Expense Records</h3>
        <a href="/credit-enter" class="back-btn">Back</a>
    </div>

    <div class="container">
        <h2>All Credit</h2>

        <table>
            <tr>
                <th>Date</th>
                <th>person</th>
                <th>Amount</th>
            </tr>
            {% for credit in credits %}
            <tr>
                <td>{{ credit[0] }}</td>
                <td>{{ credit[1] }}</td>
                <td>₹ {{ credit[2] }}</td>
            </tr>
            {% endfor %}
        </table>

        <div class="modify-div">
            <!--Modify in database-->
            <a href="/verification"><button class="Modify-btn" name="action" value="modify-credit">Modify</button></a>
        </div>

        <div class="clear-div">
            <!-- Clear the data -->
            <a href="/verification"><button class="Modify-btn" name="action" value="clear-credit">Clear data</button></a>
        </div>
        <div class="total">
            Total: ₹ 
            {{ credits | sum(attribute=2) }}
        </div>

    </div>

</body>
</html>
