<!DOCTYPE html>
<html>
<head>
    <title>Daily Expense Tracker - Home</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .header {
            display: flex;
            justify-content: flex-end;
            padding: 20px;
        }

        .view-btn {
            padding: 8px 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }

        .view-btn:hover {
            background-color: #555;
        }

        .container {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 30px;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .action-btn:hover {
            background-color: #45a049;
        }

    </style>
</head>

<body>

    <div class="container">
        <h2>Daily Expense Tracker</h2>

        <form method="POST">
            <button type="submit" name="action" value="income" class="action-btn">
                Income
            </button>
                <button type="submit" name="action" value="expense" class="action-btn">
                    Expense
                </button>
        </form>

    </div>

</body>
</html>
