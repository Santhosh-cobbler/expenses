<!DOCTYPE html>
<html>
<head>
    <title>Daily Expense Tracker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .header {
            display: flex;
            justify-content: flex-end;
            padding: 20px;
        }

        .view-btn {
            padding: 8px 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .view-btn:hover {
            background-color: #555;
        }

        .container {
            width: 350px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button[type="submit"]:hover {
            background-color: #45a049;
        }

    </style>
</head>

<body>

    <div class="header">
        <a href="/debit-db">
            <button class="view-btn">View Data</button>
        </a>
    </div>

    <div class="container">
        <h2>Daily Expense Entry</h2>

        <form method="POST">
            <label>Date:</label>
            <input type="date" name="date">

            <label>Description:</label>
            <input type="text" name="description" required>

            <label>Amount:</label>
            <input type="number" step="0.01" name="amount" required>

            <button type="submit">Submit</button>
        </form>
    </div>

</body>
</html>
